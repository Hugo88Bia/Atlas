<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ATLAS</title>
<style>
:root{
  --bg:#02060a;
  --bg2:#04101a;
  --core:#1fe88a;       /* atlas green */
  --core-soft:#0aff9d;
  --core-dim:#0c5c42;
  --text:#d4fff0;
  --muted:#5e8c7d;
  --user:#0e2a22;
  --panel:rgba(10,30,24,.55);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'SF Mono',ui-monospace,'Roboto Mono',Menlo,monospace;
  -webkit-user-select:none;user-select:none;}
body{display:flex;flex-direction:column;
  background:radial-gradient(ellipse at 50% 30%,#06141d 0%,#02060a 70%);}

/* ── Top status bar ── */
#topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top)) 18px 10px;font-size:11px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;}
#brand{display:flex;align-items:center;gap:9px;color:var(--core);font-weight:600;letter-spacing:5px;}
#brand .dot{width:7px;height:7px;border-radius:50%;background:var(--core);
  box-shadow:0 0 10px var(--core);animation:blink 2.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#model-tag{font-size:10px;color:var(--core-soft);border:1px solid var(--core-dim);
  padding:3px 8px;border-radius:20px;letter-spacing:1px;min-width:64px;text-align:center;}

/* ── Orb stage ── */
#stage{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  height:34vh;position:relative;}
#orb-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
canvas#orb{position:absolute;inset:0;width:100%;height:100%;}
#status-text{position:absolute;bottom:-6px;font-size:10px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;white-space:nowrap;}

/* ── Transcript ── */
#log{flex:1 1 auto;overflow-y:auto;padding:6px 16px 12px;display:flex;flex-direction:column;gap:14px;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.msg{max-width:88%;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;
  animation:rise .3s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.a{align-self:flex-start;color:var(--text);}
.msg.a .who{color:var(--core);font-size:10px;letter-spacing:3px;display:block;margin-bottom:4px;text-transform:uppercase;}
.msg.u{align-self:flex-end;background:var(--user);border:1px solid #14392e;
  padding:10px 14px;border-radius:16px 16px 4px 16px;color:#aef5da;}
.msg.sys{align-self:center;color:var(--muted);font-size:11px;letter-spacing:1px;text-align:center;
  border:1px dashed #16382c;border-radius:10px;padding:8px 12px;max-width:92%;}
/* code blocks */
pre{background:#020a09;border:1px solid #123b2c;border-radius:12px;padding:12px 12px 38px;
  overflow-x:auto;margin:8px 0;position:relative;font-size:12.5px;line-height:1.5;color:#9affd5;}
pre .copy{position:absolute;bottom:8px;right:8px;background:var(--core-dim);color:#d4fff0;
  border:none;border-radius:7px;padding:5px 12px;font-size:11px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;text-transform:uppercase;}
pre .copy:active{background:var(--core);color:#012}
code:not(pre code){background:#06170f;border:1px solid #16382c;border-radius:5px;padding:1px 6px;color:#7dffc0;font-size:12.5px;}
.typing{display:inline-flex;gap:5px;align-items:center}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--core);display:inline-block;
  animation:td 1s infinite}
.typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
@keyframes td{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* ── Control deck ── */
#deck{flex:0 0 auto;padding:10px 16px max(16px,env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:10px;
  background:linear-gradient(to top,#04101a 60%,transparent);}
#inputrow{display:flex;gap:9px;align-items:flex-end;}
#field{flex:1;background:var(--panel);border:1px solid #15463400;border:1px solid #154634;
  border-radius:18px;color:var(--text);font-family:inherit;font-size:14px;padding:12px 14px;
  resize:none;max-height:120px;outline:none;line-height:1.4;}
#field::placeholder{color:#3c6657;}
#field:focus{border-color:var(--core-dim);}
.btn{flex:0 0 auto;width:48px;height:48px;border-radius:50%;border:1px solid #154634;
  background:var(--panel);color:var(--core);font-size:20px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:transform .12s,background .2s;}
.btn:active{transform:scale(.9);}
.btn.live{background:var(--core);color:#021;box-shadow:0 0 18px var(--core);}
#mic.listening{animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 18px var(--core)}50%{box-shadow:0 0 30px var(--core),0 0 50px var(--core)}}
#toolsrow{display:flex;gap:8px;align-items:center;justify-content:space-between;font-size:11px;}
.toggle{display:flex;align-items:center;gap:6px;color:var(--muted);letter-spacing:1px;cursor:pointer;
  border:1px solid #133a2c;border-radius:20px;padding:6px 11px;text-transform:uppercase;}
.toggle.on{color:var(--core);border-color:var(--core-dim);background:rgba(31,232,138,.07);}
.toggle .sw{width:8px;height:8px;border-radius:50%;background:#2c4d40;}
.toggle.on .sw{background:var(--core);box-shadow:0 0 8px var(--core);}

/* ── Setup screen ── */
#setup{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 35%,#06141d,#01040700 70%),var(--bg);
  z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;text-align:center;gap:18px;}
#setup h1{font-size:46px;letter-spacing:14px;color:var(--core);font-weight:700;
  text-shadow:0 0 30px rgba(31,232,138,.5);}
#setup p{color:var(--muted);font-size:12.5px;line-height:1.7;max-width:330px;letter-spacing:.5px;}
#setup input{width:100%;max-width:340px;background:var(--panel);border:1px solid #154634;border-radius:14px;
  color:var(--text);font-family:inherit;font-size:13px;padding:14px;outline:none;text-align:center;}
#setup button{background:var(--core);color:#021;border:none;border-radius:14px;font-family:inherit;
  font-weight:700;letter-spacing:3px;padding:14px 34px;font-size:13px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 24px rgba(31,232,138,.4);}
#setup .err{color:#ff6b6b;font-size:11.5px;min-height:14px;}
#setup .key-note{font-size:10.5px;color:#3c6657;max-width:330px;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>

<!-- SETUP / KEY ENTRY -->
<div id="setup">
  <h1>ATLAS</h1>
  <p>Your private AI. Add your Anthropic key to bring me online. It stays on this device only — never uploaded, never shared.</p>
  <input id="keyin" type="password" placeholder="sk-ant-..." autocomplete="off" autocapitalize="off" spellcheck="false">
  <div class="err" id="keyerr"></div>
  <button id="keygo">Bring Atlas Online</button>
  <p class="key-note">Get a key at platform.claude.com → API keys. Charges go to your own Anthropic credit (a few pennies per chat).</p>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="brand"><span class="dot"></span>ATLAS</div>
  <div id="model-tag">STANDBY</div>
</div>

<!-- ORB -->
<div id="stage">
  <div id="orb-wrap">
    <canvas id="orb"></canvas>
    <div id="status-text">tap to wake</div>
  </div>
</div>

<!-- TRANSCRIPT -->
<div id="log"></div>

<!-- CONTROL DECK -->
<div id="deck">
  <div id="inputrow">
    <button class="btn" id="attach" title="Attach">📎</button>
    <textarea id="field" rows="1" placeholder="Ask Atlas, or say his name…"></textarea>
    <button class="btn" id="mic" title="Talk">🎙️</button>
    <button class="btn" id="send" title="Send">▲</button>
  </div>
  <input id="fileinput" type="file" accept="image/*,application/pdf" multiple style="display:none">
  <div id="chips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  <div id="toolsrow">
    <div class="toggle on" id="wake-toggle"><span class="sw"></span>Wake word</div>
    <div class="toggle on" id="voice-toggle"><span class="sw"></span>Voice</div>
    <div class="toggle" id="mentor-toggle"><span class="sw"></span>Mentor</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  ATLAS  ·  futuristic personal AI
// ════════════════════════════════════════════════════════
// Global safety net: show real errors instead of a blank screen
function showErr(label, e){
  try{
    const log = document.getElementById('log');
    if(!log) return;
    const d=document.createElement('div'); d.className='msg sys';
    let detail = e ? ((e.name||'')+' — '+(e.message||e)) : 'unknown';
    d.textContent=label+': '+detail;
    log.appendChild(d);
  }catch(_){}
}
window.addEventListener('error', ev=>{ showErr('Error', ev.error || ev.message); });
window.addEventListener('unhandledrejection', ev=>{ showErr('Promise error', ev.reason); });
const $ = id => document.getElementById(id);
const log = $('log');
const KEY_STORE = 'atlas-key';
const HIST_STORE = 'atlas-hist';

let API_KEY = localStorage.getItem(KEY_STORE) || '';
let history = [];
try { history = JSON.parse(localStorage.getItem(HIST_STORE)||'[]'); } catch(e){ history=[]; }

let settings = {
  wake: true, voice: true, mentor: false,
};

// ── State ──
let orbState = 'idle';   // idle | listening | thinking | speaking
let speakingLevel = 0;
let lastInputWasVoice = false;   // Atlas only speaks back when YOU spoke
let pendingFiles = [];           // files staged to send with next message

// ════════════════════════════════════════════════════════
//  SETUP / KEY
// ════════════════════════════════════════════════════════
function showApp(){
  $('setup').classList.add('hidden');
  if (history.length) {
    history.forEach(m=> addMsg(m.role==='user'?'u':'a', m.text, false));
  } else {
    addMsg('sys','ATLAS online. Tap the orb or mic to talk, or just type. Say "Atlas" to wake me.');
  }
}
if (API_KEY) {
  try { showApp(); }
  catch(err){
    const log=$('log');
    if(log){ const d=document.createElement('div'); d.className='msg sys';
      d.textContent='showApp failed: '+(err&&err.name)+' — '+(err&&err.message); log.appendChild(d); }
  }
}

$('keygo').onclick = ()=>{
  const k = $('keyin').value.trim();
  if (!k.startsWith('sk-ant-')) { $('keyerr').textContent='That doesn\u2019t look like an Anthropic key.'; return; }
  API_KEY = k;
  localStorage.setItem(KEY_STORE, k);
  showApp();
};

// ════════════════════════════════════════════════════════
//  MODEL AUTO-ROUTER
//  Reads the request and picks the smartest *necessary* model.
// ════════════════════════════════════════════════════════
const MODELS = {
  haiku:  'claude-haiku-4-5-20251001',
  sonnet: 'claude-sonnet-4-6',
  opus:   'claude-opus-4-8',
};
function pickModel(text){
  const t = text.toLowerCase();
  // Heavy coding / reasoning → Opus
  const heavy = /\b(code|coding|function|debug|bug|refactor|algorithm|build (me )?an?|write (a )?(script|program|app|component|class)|api|regex|sql|python|javascript|react|html|css|node|architecture|design pattern|optimi[sz]e|fix this|error|stack trace|compile|typescript|c\+\+|rust|why (doesn'?t|won'?t|isn'?t)|explain (this )?code|review (my )?code)\b/;
  // Medium reasoning / longer thinking → Sonnet
  const medium = /\b(explain|how (do|does|can|would)|why|compare|plan|strategy|summari[sz]e|analy[sz]e|draft|write|translate|teach|step by step|pros and cons|difference between)\b/;
  if (heavy.test(t) || text.length > 600) return 'opus';
  if (medium.test(t)) return 'sonnet';
  return 'haiku';
}
const MODEL_LABEL = { haiku:'HAIKU', sonnet:'SONNET', opus:'OPUS' };

// ════════════════════════════════════════════════════════
//  SYSTEM PROMPT  (mentor brain)
// ════════════════════════════════════════════════════════
function systemPrompt(){
  let base = `You are ATLAS — a sharp, futuristic personal AI assistant in the spirit of a calm British operations AI (think JARVIS). You speak concisely and with quiet confidence. You are exceptional at coding (give clean, correct, well-explained code) and broadly knowledgeable. Address the user naturally. Keep spoken-style answers tight; expand when the task genuinely needs depth. When you give code, use fenced code blocks.`;
  if (settings.mentor){
    base += ` MENTOR MODE: Do not just agree. Challenge the user's thinking, point out flaws and risks, ask sharp questions, and push them to execute rather than just plan. Be direct and honest like a real mentor who wants them to grow, while staying respectful and encouraging.`;
  }
  return base;
}

// ════════════════════════════════════════════════════════
//  TRANSCRIPT RENDERING
// ════════════════════════════════════════════════════════
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMarkdown(text){
  // code fences
  let html = escapeHtml(text);
  html = html.replace(/```(\w+)?\n?([\s\S]*?)```/g, (m,lang,code)=>{
    const id='c'+Math.random().toString(36).slice(2,8);
    return `<pre><code id="${id}">${code.replace(/\n$/,'')}</code><button class="copy" data-c="${id}">Copy</button></pre>`;
  });
  // inline code
  html = html.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  // bold
  html = html.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  return html;
}
function addMsg(type, text, save=true){
  const div = document.createElement('div');
  div.className = 'msg '+type;
  if (type==='a'){
    div.innerHTML = '<span class="who">Atlas</span>'+renderMarkdown(text);
  } else if (type==='u'){
    div.textContent = text;
  } else {
    div.textContent = text;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  // wire copy buttons
  div.querySelectorAll('.copy').forEach(b=>{
    b.onclick=()=>{
      const el=$(b.dataset.c);
      navigator.clipboard?.writeText(el.textContent);
      b.textContent='Copied'; setTimeout(()=>b.textContent='Copy',1200);
    };
  });
  if (save && (type==='u'||type==='a')){
    history.push({role:type==='u'?'user':'assistant', text});
    localStorage.setItem(HIST_STORE, JSON.stringify(history.slice(-40)));
  }
  return div;
}

// ════════════════════════════════════════════════════════
//  CALL THE API
// ════════════════════════════════════════════════════════
async function ask(userText){
  if (!userText.trim() && !pendingFiles.length) return;
  const filesForThisTurn = pendingFiles.slice();
  pendingFiles = []; renderChips();

  const label = filesForThisTurn.length
    ? (userText.trim()? userText : '(sent '+filesForThisTurn.length+' file'+(filesForThisTurn.length>1?'s':'')+')')
    : userText;
  addMsg('u', label);
  const model = pickModel(userText);
  $('model-tag').textContent = MODEL_LABEL[model];
  setOrb('thinking');

  // typing indicator
  const ind = document.createElement('div');
  ind.className='msg a';
  ind.innerHTML='<span class="who">Atlas</span><span class="typing"><i></i><i></i><i></i></span>';
  log.appendChild(ind); log.scrollTop=log.scrollHeight;

  // prior turns as plain text, then this turn with any attachments
  const prior = history
    .filter(m=>m.role==='user'||m.role==='assistant')
    .slice(-20, -1)
    .map(m=>({role:m.role, content:m.text}));

  let lastContent;
  if (filesForThisTurn.length){
    lastContent = filesForThisTurn.map(f=> f.kind==='document'
      ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data:f.data } }
      : { type:'image', source:{ type:'base64', media_type:f.type, data:f.data } }
    );
    lastContent.push({ type:'text', text: userText || 'Please look at the attached file(s).' });
  } else {
    lastContent = userText;
  }
  const messages = [...prior, { role:'user', content: lastContent }];

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model: MODELS[model],
        max_tokens: 1800,
        system: systemPrompt(),
        messages,
      }),
    });
    ind.remove();
    if(!res.ok){
      const e = await res.text();
      let msg='Connection failed (status '+res.status+').';
      if(res.status===401) msg='API key rejected. Re-check your key — this is your Anthropic API key, separate from any Claude.ai subscription.';
      else if(res.status===429) msg='API rate limited. Wait a moment and try again.';
      else if(res.status===400 && /credit|balance/i.test(e)) msg='Your Anthropic API credit has run out. Top up at platform.claude.com → Billing. (This is separate from Claude.ai.)';
      else if(res.status===529) msg='Anthropic servers are overloaded right now. Try again shortly.';
      else if(/credit|balance/i.test(e)) msg='Out of API credit. Top up at platform.claude.com → Billing.';
      addMsg('sys', msg);
      setOrb('idle');
      return;
    }
    const data = await res.json();
    const reply = (data.content||[]).map(c=>c.type==='text'?c.text:'').join('\n').trim() || '…';
    addMsg('a', reply);
    if (lastInputWasVoice) speak(reply); else setOrb('idle');
  }catch(err){
    ind.remove();
    addMsg('sys','Network error. Check your connection.');
    setOrb('idle');
  }
}

// ════════════════════════════════════════════════════════
//  VOICE OUTPUT  (JARVIS-style: deepest British male voice)
// ════════════════════════════════════════════════════════
let voices = [];
const HAS_TTS = (typeof speechSynthesis !== 'undefined') && ('speechSynthesis' in window);
function loadVoices(){ try{ if(HAS_TTS) voices = speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; } }
loadVoices();
if (HAS_TTS) { try{ speechSynthesis.onvoiceschanged = loadVoices; }catch(e){} }

let chosenVoiceName = localStorage.getItem('atlas-voice') || '';
function pickVoice(){
  if (chosenVoiceName){ const saved=voices.find(v=>v.name===chosenVoiceName); if(saved) return saved; }
  // Prefer premium/enhanced/Siri voices (far less robotic on iOS & Mac)
  const order = [
    v=>/en-GB/i.test(v.lang) && /(siri|premium|enhanced|neural)/i.test(v.name),
    v=>/en/i.test(v.lang) && /(siri|premium|enhanced|neural)/i.test(v.name),
    v=>/en-GB/i.test(v.lang) && /male|daniel|arthur|george|oliver/i.test(v.name),
    v=>/en-GB/i.test(v.lang),
    v=>/daniel|arthur|george/i.test(v.name),
    v=>/en[-_]/i.test(v.lang),
  ];
  for(const test of order){ const m=voices.find(test); if(m) return m; }
  return voices[0];
}
function stripForSpeech(text){
  return text
    .replace(/```[\s\S]*?```/g,'. Code is on screen. ')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/\*\*/g,'').replace(/[#>*_]/g,'')
    .slice(0,700);
}
function speak(text){
  if (!settings.voice || !HAS_TTS) { setOrb('idle'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(stripForSpeech(text));
  const v = pickVoice(); if(v) u.voice=v;
  u.rate=1.0; u.pitch=.95;   // closer to natural; premium voices sound best near default
  u.onstart=()=>setOrb('speaking');
  u.onend=()=>{ setOrb('idle'); if(settings.wake) startWakeListen(); };
  // animate orb roughly to speech rhythm
  u.onboundary=()=>{ speakingLevel = .6 + Math.random()*.4; };
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════════════
//  VOICE INPUT  +  WAKE WORD ("Atlas")
// ════════════════════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, wakeRecog=null, micActive=false, wakeActive=false;

function initDictation(){
  if(!SR) return null;
  const r=new SR();
  r.lang='en-GB'; r.interimResults=true; r.continuous=false;
  return r;
}
$('mic').onclick = ()=> toggleMic();
function toggleMic(){
  if(!SR){ addMsg('sys','Voice input not supported in this browser. Try Safari.'); return; }
  if(location.protocol==='file:'){
    addMsg('sys','Mic blocked: Atlas is running as a local file. iOS only allows the microphone on an https:// web page. Host Atlas on GitHub Pages and open it from there.');
    return;
  }
  if(micActive){ recog && recog.stop(); return; }
  stopWakeListen();
  recog = initDictation();
  let finalText='';
  micActive=true; $('mic').classList.add('listening'); setOrb('listening');
  $('status-text').textContent='listening…';
  recog.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText+=t; else interim+=t;
    }
    $('field').value=(finalText+interim).trim();
  };
  recog.onend=()=>{
    micActive=false; $('mic').classList.remove('listening');
    const txt=$('field').value.trim();
    if(txt){ $('field').value=''; lastInputWasVoice=true; ask(txt); }
    else { setOrb('idle'); if(settings.wake) startWakeListen(); }
  };
  recog.onerror=(e)=>{
    micActive=false; $('mic').classList.remove('listening'); setOrb('idle');
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      addMsg('sys','Mic permission denied. Allow microphone access for this site in iOS settings, then try again.');
    } else if(e.error==='no-speech'){
      // silent — normal when nothing was said
    } else {
      addMsg('sys','Mic error: '+e.error+'. Atlas needs an https:// page for voice to work.');
    }
  };
  try{ recog.start(); }
  catch(err){ micActive=false; $('mic').classList.remove('listening'); setOrb('idle'); addMsg('sys','Could not start the mic: '+err.message); }
}

// Wake-word listener: passively waits to hear "Atlas"
function startWakeListen(){
  if(!SR || !settings.wake || micActive || wakeActive) return;
  wakeRecog=initDictation(); wakeRecog.continuous=true;
  wakeActive=true;
  wakeRecog.onresult=(e)=>{
    const last=e.results[e.results.length-1][0].transcript.toLowerCase();
    if(/\batlas\b/.test(last)){
      stopWakeListen();
      beepWake();
      setTimeout(()=>toggleMic(),250);
    }
  };
  wakeRecog.onend=()=>{ wakeActive=false; if(settings.wake && !micActive) setTimeout(startWakeListen,400); };
  wakeRecog.onerror=()=>{ wakeActive=false; };
  try{ wakeRecog.start(); }catch(e){ wakeActive=false; }
}
function stopWakeListen(){ if(wakeRecog){ try{wakeRecog.stop();}catch(e){} } wakeActive=false; }

function beepWake(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.setValueAtTime(660,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320,ac.currentTime+.12);
    g.gain.setValueAtTime(.18,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.25);
    o.start(); o.stop(ac.currentTime+.26);
  }catch(e){}
}

// ════════════════════════════════════════════════════════
//  FILE ATTACHMENTS  (images + PDFs → sent to the API)
// ════════════════════════════════════════════════════════
$('attach').onclick = ()=> $('fileinput').click();
$('fileinput').onchange = async (e)=>{
  for (const f of e.target.files){
    if (f.size > 8*1024*1024){ addMsg('sys', f.name+' is too large (max 8MB).'); continue; }
    try{
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=()=>rej(); r.readAsDataURL(f);
      });
      pendingFiles.push({ name:f.name, type:f.type, data:b64,
        kind: f.type==='application/pdf' ? 'document' : 'image' });
    }catch(err){ addMsg('sys','Could not read '+f.name); }
  }
  $('fileinput').value='';
  renderChips();
};
function renderChips(){
  const c=$('chips'); c.innerHTML='';
  pendingFiles.forEach((f,i)=>{
    const chip=document.createElement('div');
    chip.style.cssText='display:flex;align-items:center;gap:6px;background:var(--user);border:1px solid #14392e;border-radius:14px;padding:5px 10px;font-size:11px;color:#aef5da;';
    chip.innerHTML=(f.kind==='document'?'📄 ':'🖼️ ')+f.name.slice(0,22)+' <span style="cursor:pointer;color:#ff6b6b;font-weight:700;">✕</span>';
    chip.querySelector('span').onclick=()=>{ pendingFiles.splice(i,1); renderChips(); };
    c.appendChild(chip);
  });
}

// ════════════════════════════════════════════════════════
//  TOGGLES  +  SEND
// ════════════════════════════════════════════════════════
function wireToggle(id,key,onChange){
  $(id).onclick=()=>{
    settings[key]=!settings[key];
    $(id).classList.toggle('on',settings[key]);
    onChange && onChange();
  };
}
wireToggle('wake-toggle','wake',()=>{ settings.wake?startWakeListen():stopWakeListen(); });
wireToggle('voice-toggle','voice',()=>{ if(!settings.voice && HAS_TTS){ try{speechSynthesis.cancel();}catch(e){} } });
wireToggle('mentor-toggle','mentor');

const field=$('field');
field.addEventListener('input',()=>{ field.style.height='auto'; field.style.height=Math.min(field.scrollHeight,120)+'px'; });
field.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); doSend(); }});
$('send').onclick=doSend;
function doSend(){ const t=field.value.trim(); if(!t && !pendingFiles.length)return; field.value=''; field.style.height='auto'; lastInputWasVoice=false; ask(t); }

// Tap orb to talk
$('orb-wrap').addEventListener('click',()=>{ ensureAudio(); toggleMic(); });

// iOS requires a user gesture before audio/mic — unlock on first tap
let audioReady=false;
function ensureAudio(){
  if(audioReady) return; audioReady=true;
  try{ const a=new(window.AudioContext||window.webkitAudioContext)(); a.resume(); }catch(e){}
  // prime speech synth
  if(HAS_TTS){ try{ const u=new SpeechSynthesisUtterance(' '); speechSynthesis.speak(u); }catch(e){} }
  if(settings.wake) startWakeListen();
  $('status-text').textContent=settings.wake?'say "atlas"':'ready';
}
document.body.addEventListener('click',ensureAudio,{once:true});

// ════════════════════════════════════════════════════════
//  THE ORB  —  reactive green core
// ════════════════════════════════════════════════════════
const cv=$('orb'), c=cv.getContext('2d');
let DPR=Math.min(devicePixelRatio||1,2);
function sizeOrb(){ const s=200; cv.width=s*DPR; cv.height=s*DPR; c.setTransform(DPR,0,0,DPR,0,0); }
sizeOrb();
function setOrb(s){
  orbState=s;
  const map={idle:'standby',listening:'listening…',thinking:'processing…',speaking:'speaking'};
  $('status-text').textContent = (s==='idle' && settings.wake) ? 'say "atlas"' : (map[s]||'');
  if(s==='idle' && API_KEY) $('model-tag').textContent='READY';
}
let tphase=0;
function drawOrb(ts){
  const w=200,h=200,cx=w/2,cy=h/2;
  c.clearRect(0,0,w,h);
  tphase+=0.016;
  let baseR=44, energy=0.25, rings=3;
  if(orbState==='listening'){ energy=.55; }
  if(orbState==='thinking'){ energy=.4; rings=4; }
  if(orbState==='speaking'){ energy=.5+speakingLevel*.7; }
  speakingLevel*=0.92;

  // outer glow
  const glow=c.createRadialGradient(cx,cy,4,cx,cy,96);
  glow.addColorStop(0,'rgba(31,232,138,'+(0.22+energy*.18)+')');
  glow.addColorStop(1,'rgba(31,232,138,0)');
  c.fillStyle=glow; c.beginPath(); c.arc(cx,cy,96,0,7); c.fill();

  // pulsing concentric rings (the "music" feel)
  for(let i=0;i<rings;i++){
    const ph=tphase*1.6 - i*0.7;
    const pulse=(Math.sin(ph)*0.5+0.5);
    const r=baseR + i*16 + pulse*energy*28;
    const a=(0.5 - i*0.12) * (0.5+energy);
    c.strokeStyle='rgba(31,232,138,'+Math.max(0,a)+')';
    c.lineWidth=2;
    c.beginPath(); c.arc(cx,cy,r,0,7); c.stroke();
  }

  // waveform band when speaking/listening
  if(orbState==='speaking'||orbState==='listening'){
    c.strokeStyle='rgba(10,255,157,.8)'; c.lineWidth=2.2;
    c.beginPath();
    for(let a=0;a<=Math.PI*2;a+=0.18){
      const wob=Math.sin(a*6+tphase*8)*energy*10 + Math.sin(a*3-tphase*5)*energy*6;
      const rr=baseR+8+wob;
      const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
      a===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.closePath(); c.stroke();
  }

  // core sphere
  const core=c.createRadialGradient(cx-8,cy-8,2,cx,cy,baseR);
  core.addColorStop(0,'#d6ffe8');
  core.addColorStop(.4,'#1fe88a');
  core.addColorStop(1,'#063b29');
  c.fillStyle=core;
  c.beginPath(); c.arc(cx,cy,baseR+ (orbState==='speaking'?speakingLevel*6:0),0,7); c.fill();

  // inner highlight
  c.fillStyle='rgba(255,255,255,.5)';
  c.save(); c.translate(cx-12,cy-14); c.scale(1.6,1);
  c.beginPath(); c.arc(0,0,5,0,7); c.fill(); c.restore();

  requestAnimationFrame(drawOrbSafe);
}
function drawOrbSafe(ts){ try{ drawOrb(ts); }catch(e){ /* never let the orb crash the app */ } }
requestAnimationFrame(drawOrbSafe);

</script>
